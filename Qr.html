<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Full Page Image</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills page nicely */
        }

        @media print {
            body {
                margin: 0;
            }

            img {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

<img src="your-image.jpg" alt="Full Page Image">

<script>
    window.onload = function() {
        window.print();
    };
</script>

</body>
</html>
