<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Full Page Print</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills entire page */
        }

        /* Print settings */
        @media print {
            @page {
                margin: 0;
            }

            body {
                margin: 0;
            }

            img {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>

<body onload="window.print()">

    <!-- Make sure image is in same folder -->
    <img src="trisha.jpg" alt="Full Page Image">

</body>
</html>
